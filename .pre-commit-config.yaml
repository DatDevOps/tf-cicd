repos:
  - repo: local
    hooks:
      # Formats Terraform configuration files
      - id: terraform-fmt
        name: Terraform Format
        # command to format all .tf files in the repository
        language: system
        entry: terraform fmt -recursive 
        files: \.tf$
        pass_filenames: false

      # Validates Terraform configuration files
      - id: terraform-validate
        name: Terraform Validate
        entry: terraform validate
        language: system
        files: \.tf$
        pass_filenames: false

      # Runs tflint for linting
      - id: tflint
        name: TFLint
        ### throws error "Failed to load TFLint config; failed to load file: open .tflint.hcl: no such file or directory"
        # # command to run tflint with the specified configuration file in root directory of the repository - terrafom
        ##hence the modification to run in a specified directory with  the '--chdir' flag
        # entry: tflint --config=.tflint.hcl 
        # command to run tflint with the specified configuration file in the base_app directory and not in the root of the repository - terrafom
        entry: tflint --chdir=intermediate/07-automation-gitops/01-automation/base_app --config=.tflint.hcl
        language: system
        files: \.tf$
        pass_filenames: false

      # Generates documentation from Terraform modules
      - id: terraform-docs
        name: Terraform Docs
        # # Generates documentation from Terraform modules  and injects it into TACOWAGON.md and stored in repo root directory
        entry: terraform-docs markdown table --output-file TACOWAGON.md --output-mode inject .
        # entry: terraform-docs markdown table --output-file ./intermediate/07-automation-gitops/01-automation/base_app/TACOWAGON.md --output-mode inject ./intermediate/07-automation-gitops/01-automation/base_app
        language: system
        files: \.tf$
        pass_filenames: false
